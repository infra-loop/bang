<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BangEditor - Simple Integrtion Example</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
    }

    h1 {
      color: #4a90e2;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      background: #f5f5f5;
      border-radius: 4px;
    }
  </style>
  <!-- Include BangEditor CSS -->
  <link rel="stylesheet" href="../dist/style.css">
</head>

<body>
  <h1>BangEditor - Simple Integration</h1>

  <p>This example shows how to integrate BangEditor into your project:</p>

  <!-- Editor container -->
  <div id="editor"></div>

  <div class="result">
    <h3>HTML Output:</h3>
    <pre id="html-output"></pre>
  </div>

  <!-- Include BangEditor JavaScript -->
  <script type="module">
    // Import BangEditor from the built distribution
    // In your project, you would import from 'bang-editor'
    import BangEditor from '../dist/bang-editor.js';

    // Initialize the editor
    const editor = new BangEditor('#editor', {
      placeholder: 'Write your content here...',
      height: '400px',
      // Custom toolbar with only essential buttons
      toolbar: [
        'bold', 'italic', 'underline', '|',
        'h1', 'h2', 'h3', '|',
        'orderedList', 'unorderedList', '|',
        'link', 'image', '|',
        'undo', 'redo'
      ],
      // Update HTML output whenever content changes
      onChange: (content) => {
        document.getElementById('html-output').textContent = content;
      }
    });

    // Set some initial content
    editor.setContent('<h2>Welcome to BangEditor!</h2><p>Start editing this content or create your own.</p>');
  </script>
</body>

</html>
